[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  function = "og"
  path = "/*"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Artifact serving — proxy to API (must be before catch-all)
# Ephemeral artifacts: /view/_/{id}
[[redirects]]
  from = "/view/_/:id"
  to = "https://egregore-production-55f2.up.railway.app/api/artifacts/_/:id"
  status = 200
  force = true

# Org-scoped artifacts: /view/{org}/{id}
[[redirects]]
  from = "/view/:org/:id"
  to = "https://egregore-production-55f2.up.railway.app/api/artifacts/:org/:id"
  status = 200
  force = true

# /view/{org} falls through to SPA catch-all → React Router handles listing page

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
