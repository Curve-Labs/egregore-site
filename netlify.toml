[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  function = "og"
  path = "/*"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Artifact serving — proxy to API (must be before catch-all)
[[redirects]]
  from = "/view/:org/:id"
  to = "https://egregore-production-55f2.up.railway.app/api/artifacts/:org/:id"
  status = 200
  force = true

[[redirects]]
  from = "/view/:id"
  to = "https://egregore-production-55f2.up.railway.app/api/artifacts/:id"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
