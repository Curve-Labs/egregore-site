[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

[[edge_functions]]
  function = "emissary-metrics"
  path = "/api/emissary-metrics"

# Emissary platform namespace (spec §2.3): /@{handle},
# /@{handle}/{slug}, /@{handle}/{slug}/raw → Railway. Redirect
# placeholders can't match the @-prefixed segment, so an edge function
# proxies the /@* path space. Declared before `og` so addresses resolve
# first; non-address /@* paths fall through via context.next().
[[edge_functions]]
  function = "platform-namespace"
  path = "/@*"

[[edge_functions]]
  function = "og"
  path = "/*"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Egregore installer — served as text so curl | bash works.
[[headers]]
  for = "/install.sh"
  [headers.values]
    Content-Type = "text/x-shellscript; charset=utf-8"

[[headers]]
  for = "/install"
  [headers.values]
    Content-Type = "text/x-shellscript; charset=utf-8"

# /install (no extension) rewrites to /install.sh — both URLs serve the
# same content; the no-extension form is what we tell users to curl.
# Must come before the SPA catch-all.
[[redirects]]
  from = "/install"
  to = "/install.sh"
  status = 200
  force = true

# egregore.xyz/mcp is the human-facing setup page (a Next.js route under
# app/(setup)/mcp). The bare proxy to the MCP server has been removed —
# users register at /mcp, get a personalised /mcp/u/<token> URL, and
# paste THAT (the direct Railway URL) into Claude.ai's connector panel.
# The setup page never needed the proxy; install instructions have
# always pointed at the Railway URL directly.

# Handoff v1 — proxy all handoff surfaces to Railway. Must be before SPA catch-all.
# Reply: POST /h/{id}/reply — must be before /h/{id} to match the longer path first
[[redirects]]
  from = "/h/:id/reply"
  to = "https://egregore-production-55f2.up.railway.app/h/:id/reply"
  status = 200
  force = true

# View: /h/{id} serves static HTML with embedded JSON-LD
[[redirects]]
  from = "/h/:id"
  to = "https://egregore-production-55f2.up.railway.app/h/:id"
  status = 200
  force = true

# Emissary + platform JSON API (/api/v1/*) — same-origin for the browse
# shelf and any page fetching the platform API (Railway CORS allowlist is
# egregore.xyz, so the site must call these same-origin). Must be before
# the SPA catch-all.
[[redirects]]
  from = "/api/v1/*"
  to = "https://egregore-production-55f2.up.railway.app/api/v1/:splat"
  status = 200
  force = true

# Emissary package preview endpoints (manifest + raw skill) — agents
# inspect these before consenting to install.
[[redirects]]
  from = "/emissary/manifest.json"
  to = "https://egregore-production-55f2.up.railway.app/emissary/manifest.json"
  status = 200
  force = true

[[redirects]]
  from = "/emissary/raw/*"
  to = "https://egregore-production-55f2.up.railway.app/emissary/raw/:splat"
  status = 200
  force = true

# API: publish, extend, get canonical JSON — no Railway URL leaks to users
[[redirects]]
  from = "/api/artifacts/handoff/*"
  to = "https://egregore-production-55f2.up.railway.app/api/artifacts/handoff/:splat"
  status = 200
  force = true

# Emissary platform browse page — a static Next route
# (app/(setup)/emissary/browse) that fetches the shelf client-side from
# the public platform API. The former Railway proxy is gone; the static
# file wins over the unforced SPA catch-all.

# Vanity emissary slugs — short memorable URLs for circulated emissaries.
# Proxy (200) so the URL stays egregore.xyz/emissary/{slug}. Must be before
# the /emissary/e/:id rules and the SPA catch-all.
[[redirects]]
  from = "/emissary/traction"
  to = "https://egregore-production-55f2.up.railway.app/emissary/e/fdc3e4fd-aad6-4103-bc29-0fc2cdf91e8a"
  status = 200
  force = true

# Vanity emissary slugs — the investor data room set (circulated to VCs).
[[redirects]]
  from = "/emissary/dataroom"
  to = "https://egregore-production-55f2.up.railway.app/emissary/e/211ef97c-2364-448d-b9b9-ffd39580e3cb"
  status = 200
  force = true

[[redirects]]
  from = "/emissary/deck"
  to = "https://egregore-production-55f2.up.railway.app/emissary/e/ba8e9f5e-1ad9-45e5-9be1-23e1bc3f81df"
  status = 200
  force = true

[[redirects]]
  from = "/emissary/paper"
  to = "https://egregore-production-55f2.up.railway.app/emissary/e/c2e08054-b0b5-4d5a-992d-12772b8f3040"
  status = 200
  force = true

[[redirects]]
  from = "/emissary/evals"
  to = "https://egregore-production-55f2.up.railway.app/emissary/e/233c70a4-30bd-4cf9-8a96-fc8bc6933c43"
  status = 200
  force = true

# Emissary v0 — proxy emissary read surfaces to Railway. Must be before SPA catch-all.
# These match only /emissary/e/* — the install-hub pages (/emissary,
# /emissary/verify, /emissary/i/*) are static Next routes and fall through.
# Raw agent payload: /emissary/e/{id}/raw — must be before /emissary/e/{id}
# to match the longer path first.
[[redirects]]
  from = "/emissary/e/:id/raw"
  to = "https://egregore-production-55f2.up.railway.app/emissary/e/:id/raw"
  status = 200
  force = true

# Human render: /emissary/e/{id} serves the metadata-only HTML preview
[[redirects]]
  from = "/emissary/e/:id"
  to = "https://egregore-production-55f2.up.railway.app/emissary/e/:id"
  status = 200
  force = true

# Token-bound install entry point: /emissary/i/{token} — a static Next page
# (out/emissary/i.html) that reads the token from the URL path client-side.
# Rewrite (not proxy) so the install hub renders for any token.
[[redirects]]
  from = "/emissary/i/:token"
  to = "/emissary/i.html"
  status = 200

# Artifact serving — proxy to API (must be before catch-all)
# Ephemeral artifacts: /view/_/{id}
[[redirects]]
  from = "/view/_/:id"
  to = "https://egregore-production-55f2.up.railway.app/api/artifacts/_/:id"
  status = 200
  force = true

# Org-scoped artifacts: /view/{org}/{id}
[[redirects]]
  from = "/view/:org/:id"
  to = "https://egregore-production-55f2.up.railway.app/api/artifacts/:org/:id"
  status = 200
  force = true

# /view/{org} falls through to SPA catch-all → React Router handles listing page

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
